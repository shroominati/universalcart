name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ─── Lint & Type Check ────────────────────────────────────────────────────
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: TypeScript compile check
        working-directory: backend
        run: npx tsc --noEmit

  # ─── Backend Tests ────────────────────────────────────────────────────────
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run tests
        working-directory: backend
        run: npm test
        env:
          NODE_ENV: test
          UC_AUTH_SECRET: test-ci-secret-key-0123456789abcdef
          UC_SIGNING_SECRET: test-ci-signing-key-0123456789abcdef
          UC_WS_SECRET: test-ci-ws-secret-0123456789abcdef

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-node-${{ matrix.node-version }}
          path: backend/coverage/
          retention-days: 7

  # ─── Security Audit ───────────────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: npm audit
        working-directory: backend
        run: npm audit --audit-level=high
        continue-on-error: true

  # ─── Extension Build ──────────────────────────────────────────────────────
  build-extension:
    name: Build Extension
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Validate manifest.json
        working-directory: extension
        run: |
          node -e "
            const m = require('./manifest.json');
            if (!m.manifest_version) throw new Error('Missing manifest_version');
            if (!m.name) throw new Error('Missing name');
            if (!m.version) throw new Error('Missing version');
            console.log('Manifest valid:', m.name, 'v' + m.version);
          "

      - name: Check extension structure
        working-directory: extension
        run: |
          for f in manifest.json background/service-worker.js content/cart-detector.js popup/popup.html; do
            if [ ! -f "$f" ]; then echo "Missing: $f"; exit 1; fi
          done
          echo "Extension structure OK"

      - name: Package extension (zip)
        working-directory: extension
        run: |
          zip -r ../universalcart-extension.zip . -x "*.DS_Store" "node_modules/*"
          echo "Extension packaged: $(du -h ../universalcart-extension.zip | cut -f1)"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-build
          path: universalcart-extension.zip
          retention-days: 30

  # ─── Backend Build & Docker ───────────────────────────────────────────────
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: [test-backend]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build TypeScript
        working-directory: backend
        run: npm run build

      - name: Build Docker image
        working-directory: backend
        run: |
          if [ -f Dockerfile ]; then
            docker build -t universalcart-backend:${{ github.sha }} .
            echo "Docker image built successfully"
          else
            echo "No Dockerfile found, skipping Docker build"
          fi

  # ─── Deploy (only on main push) ──────────────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build-backend, build-extension]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download extension artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-build

      - name: Deploy notification
        run: |
          echo "🚀 Ready to deploy UniversalCart v$(node -e "console.log(require('./extension/manifest.json').version)")"
          echo "Backend: SHA ${{ github.sha }}"
          echo "Extension artifact: universalcart-extension.zip"
          # Add actual deployment steps here:
          # - Push Docker image to registry
          # - Deploy to cloud provider
          # - Publish extension to Chrome Web Store
